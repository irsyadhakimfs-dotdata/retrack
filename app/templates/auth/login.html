<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — ReTrack</title>

  <!-- Google Fonts: Plus Jakarta Sans (isi) + Space Grotesk (judul/angka) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- CSS Utama (legacy) + tema baru Indigo/Amber (override) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}" />

  <!-- Terapkan tema sebelum render agar tidak kedip putih -->
  <script>
    (function(){
      var t = localStorage.getItem('refinance-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo ReTrack -->
    <a class="auth-logo" href="{{ url_for('auth_views.index') }}">
      <div class="auth-logo-icon">
        <img class="logo-light app-logo-img" src="{{ url_for('static', filename='img/logo-light.png') }}" alt="ReTrack" />
        <img class="logo-dark app-logo-img" src="{{ url_for('static', filename='img/logo-dark.png') }}" alt="ReTrack" />
      </div>
      <span class="auth-logo-text">Re<span>Track</span></span>
    </a>

    <h2 class="auth-title">Selamat datang kembali</h2>
    <p class="auth-subtitle">Masuk untuk melanjutkan ke dasbor keuanganmu</p>

    <!-- Pesan error -->
    <div id="login-error" class="alert alert-danger" style="display:none;"></div>

    <!-- Form Login — submit via fetch JSON -->
    <form id="form-login">

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          placeholder="email@contoh.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Kata Sandi</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary w-full" style="margin-top: 0.5rem;">
        <span class="material-symbols-outlined">login</span>
        Masuk
      </button>

    </form>

    <div class="auth-footer">
      Belum punya akun?
      <a href="{{ url_for('auth_views.register') }}">Daftar sekarang</a>
    </div>

  </div>
</div>

<!-- JS untuk tema persisten -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>
  document.getElementById('form-login').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    const body = {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    };

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/dashboard';
      } else {
        errEl.textContent = data.error || 'Login gagal';
        errEl.style.display = 'flex';
      }
    } catch {
      errEl.textContent = 'Terjadi kesalahan koneksi';
      errEl.style.display = 'flex';
    }
  });
</script>

</body>
</html>
