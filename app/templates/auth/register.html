<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — ReTrack</title>

  <!-- Google Fonts: Plus Jakarta Sans (isi) + Space Grotesk (judul/angka) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- CSS Utama (legacy) + tema baru Indigo/Amber (override) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}" />

  <!-- Terapkan tema sebelum render agar tidak kedip putih -->
  <script>
    (function(){
      var t = localStorage.getItem('refinance-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo ReTrack -->
    <a class="auth-logo" href="{{ url_for('auth_views.index') }}">
      <div class="auth-logo-icon">
        <img class="logo-light app-logo-img" src="{{ url_for('static', filename='img/logo-light.png') }}" alt="ReTrack" />
        <img class="logo-dark app-logo-img" src="{{ url_for('static', filename='img/logo-dark.png') }}" alt="ReTrack" />
      </div>
      <span class="auth-logo-text">Re<span>Track</span></span>
    </a>

    <h2 class="auth-title">Buat akun baru</h2>
    <p class="auth-subtitle">Mulai kelola keuanganmu dengan ReTrack secara gratis</p>

    <!-- Pesan error -->
    <div id="reg-error" class="alert alert-danger" style="display:none;"></div>

    <!-- Form Registrasi — submit via fetch JSON -->
    <form id="form-register">

      <div class="form-group">
        <label class="form-label" for="name">Nama Lengkap</label>
        <input
          class="form-control"
          type="text"
          id="name"
          name="name"
          placeholder="Nama Kamu"
          autocomplete="name"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          placeholder="email@contoh.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Kata Sandi</label>
          <input
            class="form-control"
            type="password"
            id="password"
            name="password"
            placeholder="Min. 8 karakter"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password_confirm">Konfirmasi Kata Sandi</label>
          <input
            class="form-control"
            type="password"
            id="password_confirm"
            name="password_confirm"
            placeholder="Ulangi kata sandi"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="margin-top: 0.25rem;">
        <span class="material-symbols-outlined">person_add</span>
        Daftar
      </button>

    </form>

    <div class="auth-footer">
      Sudah punya akun?
      <a href="{{ url_for('auth_views.login') }}">Masuk di sini</a>
    </div>

  </div>
</div>

<!-- JS untuk tema persisten -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>
  document.getElementById('form-register').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('reg-error');
    errEl.style.display = 'none';

    const pw  = document.getElementById('password').value;
    const pwc = document.getElementById('password_confirm').value;
    if (pw !== pwc) {
      errEl.textContent = 'Kata sandi dan konfirmasi tidak cocok';
      errEl.style.display = 'flex';
      return;
    }

    const body = {
      name:     document.getElementById('name').value.trim(),
      email:    document.getElementById('email').value.trim(),
      password: pw,
    };

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.ok) {
        /* Auto-login setelah daftar */
        const loginRes = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: body.email, password: pw }),
        });
        const loginData = await loginRes.json();
        if (loginData.ok) {
          window.location.href = '/dashboard';
        } else {
          window.location.href = '/login';
        }
      } else {
        errEl.textContent = data.error || 'Pendaftaran gagal';
        errEl.style.display = 'flex';
      }
    } catch {
      errEl.textContent = 'Terjadi kesalahan koneksi';
      errEl.style.display = 'flex';
    }
  });
</script>

</body>
</html>
