<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ReFinance</title>

                    "on-surface": "#1b1b1d",
                    "surface-container-highest": "#e4e2e4",

                    "surface": "#fcf8fa",

                    "surface-container": "#f0edef",

                    "surface-container-high": "#eae7e9",
                    "on-tertiary-fixed": "#271901",
                    "background": "#fcf8fa",

                    "surface-variant": "#e4e2e4",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",

<style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-container-margin-mobile md:p-container-margin-desktop antialiased">
<!-- Login Container Card -->
<main class="bg-surface-container-lowest w-full max-w-[420px] rounded-xl border border-outline-variant shadow-[0px_4px_12px_rgba(15,23,42,0.05)] p-xl transition-all duration-300">
<!-- Header / Logo -->
<div class="flex flex-col items-center justify-center mb-2xl text-center">
<div class="flex items-center justify-center w-12 h-12 rounded-full bg-primary-fixed mb-md">
<span class="material-symbols-outlined text-[28px] text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">
                    account_balance_wallet
                </span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">ReFinance</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Asisten keuangan presisi Anda</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline-variant pointer-events-none">
                        mail
                    </span>
<input class="w-full pl-[40px] pr-sm py-sm bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="email" name="email" placeholder="nama@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col space-y-xs">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#" tabindex="-1">Lupa password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline-variant pointer-events-none">
                        lock
                    </span>
<input class="w-full pl-[40px] pr-sm py-sm bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="password" name="password" placeholder="Masukkan password Anda" required="" type="password"/>
</div>
</div>
<!-- Submit Action -->
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-[12px] rounded-lg hover:bg-inverse-surface transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary flex justify-center items-center" type="submit">
                    Masuk
                </button>
</div>
</form>
<!-- Registration Link -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Belum punya akun? 
                <a class="font-label-md text-label-md text-secondary hover:underline transition-all" href="#">Daftar</a>
</p>
</div>
</main>
<!-- Lightweight Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                const icon = this.parentElement.querySelector('.material-symbols-outlined');
                if(icon) {
                    icon.classList.remove('text-outline-variant');
                    icon.classList.add('text-secondary');
                }
            });
            input.addEventListener('blur', function() {
                const icon = this.parentElement.querySelector('.material-symbols-outlined');
                if(icon) {
                    icon.classList.remove('text-secondary');
                    icon.classList.add('text-outline-variant');
                }
            });
        });
    </script>
</body></html>
