<body class="bg-surface min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-xl p-lg md:p-xl flex flex-col shadow-[0_4px_12px_rgba(15,23,42,0.02)] relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary"></div>
<div class="text-center mb-xl">
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">ReFinance</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Mulai kelola kekayaan Anda dengan presisi.</p>
</div>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="fullname">Nama Lengkap</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors placeholder:text-outline-variant" id="fullname" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors placeholder:text-outline-variant" id="email" placeholder="nama@email.com" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative flex items-center">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 pr-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors placeholder:text-outline-variant" id="password" placeholder="Minimal 8 karakter" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface transition-colors flex items-center justify-center h-full" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="confirm-password">Konfirmasi Password</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors placeholder:text-outline-variant" id="confirm-password" placeholder="Ulangi password Anda" type="password"/>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-lg py-4 mt-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                Daftar
                <span class="material-symbols-outlined" data-icon="arrow_forward" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Sudah punya akun? 
                <a class="text-secondary font-label-md hover:underline transition-all decoration-secondary/30 underline-offset-4" href="#">Masuk</a>
</p>
